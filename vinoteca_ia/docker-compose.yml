version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vinoteca_postgres
    environment:
      POSTGRES_USER: vinoteca
      POSTGRES_PASSWORD: vinoteca_dev
      POSTGRES_DB: vinoteca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinoteca -d vinoteca_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vinoteca_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
